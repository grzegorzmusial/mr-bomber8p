name: Build Portable MrBomber8P

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2
          make

    - name: Build native MrBoom
      shell: msys2 {0}
      run: |
        cd UWP/MrBoom
        make || echo "No makefile here"

    - name: Prepare package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path package | Out-Null

        Get-ChildItem -Recurse -Filter *.exe | ForEach-Object {
          Copy-Item $_.FullName -Destination package -Force
        }

        if (Test-Path "assets") {
          Copy-Item -Recurse -Force "assets" "package\assets"
        }

        if (Test-Path "data") {
          Copy-Item -Recurse -Force "data" "package\data"
        }

    - name: Create Install.ps1
      run: |
        echo param([string]$installPath = "$env:LOCALAPPDATA\MrBomber8P") > package\Install.ps1
        echo New-Item -ItemType Directory -Force -Path $installPath >> package\Install.ps1
        echo Copy-Item -Recurse -Force "$PSScriptRoot\*" $installPath >> package\Install.ps1
        echo Write-Host "Installed to $installPath" >> package\Install.ps1

    - name: Zip
      run: powershell Compress-Archive -Path package\* -DestinationPath mr-bomber8p.zip

    - uses: actions/upload-artifact@v4
      with:
        name: mr-bomber8p
        path: mr-bomber8p.zip