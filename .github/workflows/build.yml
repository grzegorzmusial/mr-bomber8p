name: Build MrBomber8P + Packageo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          git
          make
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2

    - name: Build
      shell: msys2 {0}
      run: |
        echo "Building project..."
        make clean || true
        make -j4

    - name: Prepare package
      run: |
        mkdir package

        REM copy exe (try common locations)
        if exist mr-bomber8p.exe copy mr-bomber8p.exe package\
        if exist build\mr-bomber8p.exe copy build\mr-bomber8p.exe package\

        REM copy assets if exist
        if exist assets xcopy assets package\assets /E /I /Y
        if exist data xcopy data package\data /E /I /Y

    - name: Create Install.ps1
      run: |
        echo param([string]$installPath = "$env:LOCALAPPDATA\MrBomber8P") > package\Install.ps1
        echo Write-Host "Installing Mr Bomber 8P..." >> package\Install.ps1
        echo New-Item -ItemType Directory -Force -Path $installPath ^| Out-Null >> package\Install.ps1
        echo Copy-Item -Recurse -Force "$PSScriptRoot\*" $installPath >> package\Install.ps1
        echo $WshShell = New-Object -comObject WScript.Shell >> package\Install.ps1
        echo $Shortcut = $WshShell.CreateShortcut("$env:PUBLIC\Desktop\Mr Bomber 8P.lnk") >> package\Install.ps1
        echo $Shortcut.TargetPath = "$installPath\mr-bomber8p.exe" >> package\Install.ps1
        echo $Shortcut.Save() >> package\Install.ps1
        echo Write-Host "Done!" >> package\Install.ps1

    - name: Zip
      run: powershell Compress-Archive -Path package\* -DestinationPath mr-bomber8p.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mr-bomber8p
        path: mr-bomber8p.zip

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: auto-build
        files: mr-bomber8p.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}