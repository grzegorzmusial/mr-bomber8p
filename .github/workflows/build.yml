name: Build Portable MrBomber8P

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2
          make
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Build UWP package
      shell: cmd
      run: |
        echo Building...

        for /r %%i in (*.sln) do (
          msbuild "%%i" /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:UapAppxPackageBuildMode=StoreUpload /p:AppxPackageDir=AppPackages\ /p:AppxPackageSigningEnabled=false
        )

    - name: Build native MrBoom
      shell: msys2 {0}
      run: |
        cd UWP/MrBoom
        make || echo "No makefile here"

    - name: Prepare package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path package | Out-Null

        # Find AppPackages output
        $pkg = Get-ChildItem -Recurse -Directory -Filter "*Test*" | Select-Object -First 1

        if ($pkg) {
            Copy-Item -Recurse -Force $pkg.FullName "package\MrBoom"
        } else {
            Write-Error "No AppPackages folder found!"
        }

    - name: Create Install.ps1
      run: |
        echo param([string]$installPath = "$env:LOCALAPPDATA\MrBomber8P") > package\Install.ps1
        echo New-Item -ItemType Directory -Force -Path $installPath >> package\Install.ps1
        echo Copy-Item -Recurse -Force "$PSScriptRoot\*" $installPath >> package\Install.ps1
        echo Write-Host "Installed to $installPath" >> package\Install.ps1

    - name: Zip
      run: powershell Compress-Archive -Path package\* -DestinationPath mr-bomber8p.zip

    - name: Collect AppPackages
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path package | Out-Null

        $pkg = Get-ChildItem -Recurse -Directory -Filter "AppPackages" | Select-Object -First 1

        if ($pkg) {
          Copy-Item -Recurse -Force $pkg.FullName "package\AppPackages"
        } else {
          Write-Error "No AppPackages found!"
        }

    - uses: actions/upload-artifact@v4
      with:
        name: mr-bomber8p
        path: mr-bomber8p.zip