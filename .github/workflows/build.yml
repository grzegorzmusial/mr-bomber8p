name: Build MrBomber8P + Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Find solution or project
      id: findproj
      shell: powershell
      run: |
        $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1

        if ($sln) {
          echo "file=$($sln.FullName)" >> $env:GITHUB_OUTPUT
        } elseif ($proj) {
          echo "file=$($proj.FullName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Error "No .sln or .csproj found!"
        }

    - name: Build
      run: |
        msbuild "${{ steps.findproj.outputs.file }}" /p:Configuration=Release /p:Platform=x64 /p:AppxPackageSigningEnabled=false

    - name: Collect output
      run: |
        mkdir package
        for /r %%i in (*.exe *.appx *.msix) do copy "%%i" package\

    - name: Create Install.ps1
      run: |
        echo Write-Host "Installing Mr Bomber 8P..." > package\Install.ps1
        echo Get-ChildItem *.appx ^| ForEach-Object { Add-AppxPackage $_.FullName } >> package\Install.ps1
        echo Write-Host "Done!" >> package\Install.ps1

    - name: Zip
      run: powershell Compress-Archive -Path package\* -DestinationPath mr-bomber8p.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mr-bomber8p
        path: mr-bomber8p.zip