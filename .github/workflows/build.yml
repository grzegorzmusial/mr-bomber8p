name: Build UWP package

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-uwp:
    runs-on: windows-2022

    env:
      SOLUTION: UWP/MrBoom.sln
      CONFIGURATION: Release
      PLATFORM: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet
        run: nuget restore "${{ env.SOLUTION }}"

      # Optional signing (recommended for installable packages)
      # Add repo secrets:
      # - UWP_PFX_BASE64: base64 of your .pfx
      # - UWP_PFX_PASSWORD: password for that .pfx
      - name: Import signing certificate (optional)
        if: ${{ secrets.UWP_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.UWP_PFX_BASE64 }}"))
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

      - name: Build + Package (Appx/MSIX)
        shell: pwsh
        run: |
          $signEnabled = if ("${{ secrets.UWP_PFX_BASE64 }}") { "true" } else { "false" }

          $args = @(
            "${{ env.SOLUTION }}",
            "/m",
            "/t:Restore,Build",
            "/p:Configuration=${{ env.CONFIGURATION }}",
            "/p:Platform=${{ env.PLATFORM }}",
            "/p:GenerateAppxPackageOnBuild=true",
            "/p:AppxBundle=Always",
            "/p:AppxBundlePlatforms=${{ env.PLATFORM }}",
            "/p:UapAppxPackageBuildMode=SideloadOnly",
            "/p:AppxPackageSigningEnabled=$signEnabled"
          )

          if ($signEnabled -eq "true") {
            $args += "/p:PackageCertificateKeyFile=$env:PFX_PATH"
            $args += "/p:PackageCertificatePassword=${{ secrets.UWP_PFX_PASSWORD }}"
          }

          msbuild @args

      - name: Upload AppPackages artifact
        uses: actions/upload-artifact@v4
        with:
          name: uwp-apppackages
          path: |
            UWP/**/AppPackages/**
            UWP/**/bin/${{ env.CONFIGURATION }}/**/*.appx
            UWP/**/bin/${{ env.CONFIGURATION }}/**/*.msix
            UWP/**/bin/${{ env.CONFIGURATION }}/**/*.appxbundle
            UWP/**/bin/${{ env.CONFIGURATION }}/**/*.msixbundle
          if-no-files-found: error