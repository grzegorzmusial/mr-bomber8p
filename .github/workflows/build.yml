name: Build MrBoom UWP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # ---------------------------
    # Clean (optional but safe)
    # ---------------------------
    - name: Clean
      shell: cmd
      run: |
        if exist UWP\MrBoom\bin rmdir /s /q UWP\MrBoom\bin
        if exist UWP\MrBoom\obj rmdir /s /q UWP\MrBoom\obj

    # ---------------------------
    # IMPORTANT FIX for MSB3644
    # ---------------------------
    - name: Set Windows SDK environment
      shell: cmd
      run: |
        echo Setting Windows SDK paths...
        set WindowsSdkDir=C:\Program Files (x86)\Windows Kits\10\
        set WindowsSDKVersion=10.0.19041.0

        echo Windows SDK Dir: %WindowsSdkDir%

    - name: Restore UWP references
      shell: cmd
      run: |
        nuget install Microsoft.Windows.SDK.Contracts -OutputDirectory packages

    - name: Set UWP reference path
      shell: cmd
      run: |
        set ReferencePath=%CD%\packages\Microsoft.Windows.SDK.Contracts.10.0.19041.1\ref
        echo %ReferencePath%

    # ---------------------------
    # Build UWP
    # ---------------------------
    - name: Build UWP Solution
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"

        msbuild UWP\MrBoom.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /p:AppxBundle=Always ^
          /p:UapAppxPackageBuildMode=StoreUpload ^
          /p:AppxPackageSigningEnabled=false ^
          /p:ReferencePath="%CD%\packages"
    # ---------------------------
    # Upload artifact
    # ---------------------------
    - name: Upload App Package
      uses: actions/upload-artifact@v4
      with:
        name: MrBoom-UWP
        path: |
          UWP/AppPackages/**