name: Build MrBomber8P UWP + Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet
      run: nuget restore

    - name: Build solution
      run: |
        msbuild /p:Configuration=Release /p:Platform=x64

    - name: Find output
      run: |
        dir /s *.exe
        dir /s *.appx

    - name: Prepare package
      run: |
        mkdir package

        REM copy all build outputs
        for /r %%i in (*.exe *.appx *.msix) do copy "%%i" package\

    - name: Create Install.ps1
      run: |
        echo Write-Host "Installing Mr Bomber 8P (UWP)..." > package\Install.ps1
        echo Get-ChildItem *.appx ^| ForEach-Object { Add-AppxPackage $_.FullName } >> package\Install.ps1
        echo Write-Host "Done!" >> package\Install.ps1

    - name: Zip
      run: powershell Compress-Archive -Path package\* -DestinationPath mr-bomber8p.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mr-bomber8p
        path: mr-bomber8p.zip